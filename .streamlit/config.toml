# .streamlit/config.toml — Vive Health Quality Suite

[server]
maxUploadSize = 500
maxMessageSize = 500
enableXsrfProtection = true
fileWatcherType = "none"
headless = true

[runner]
fastReruns = true
enforceSerializableSessionState = false
magicEnabled = false

[logger]
level = "info"

[client]
showErrorDetails = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#00F3FF"
backgroundColor = "#0B0E14"
secondaryBackgroundColor = "#151922"
textColor = "#E0E6ED"
font = "sans serif"
